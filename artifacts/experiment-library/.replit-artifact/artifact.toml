kind = "web"
previewPath = "/"
title = "Experiment Code Library"
version = "1.0.0"
id = "artifacts/experiment-library"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21694

[services.development]
run = "pnpm --filter @workspace/experiment-library run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/experiment-library", "run", "build" ]
publicDir = "artifacts/experiment-library/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21694"
BASE_PATH = "/"
